name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  go-and-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run policy tests
        run: opa test policy/core policy/domain policy/tests policy/data -v

  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/control-plane/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run control-plane tests
        run: npm run test

  bundle-smoke:
    runs-on: ubuntu-latest
    needs:
      - control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OPA bundle smoke test
        run: ./tools/ci/opa_bundle_smoke.sh
