name: arbiter-release

on:
  push:
    tags:
      - "arbiter-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without prefix (for example: 0.1.0)"
        required: true
      publish_release:
        description: "Publish GitHub release"
        required: false
        default: "true"
      update_homebrew:
        description: "Update Homebrew tap"
        required: false
        default: "true"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#arbiter-v}"
          fi
          if [[ -z "${VERSION}" ]]; then
            echo "resolved empty version" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=arbiter-v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Run Go tests
        run: go test ./...

      - name: Build release artifacts
        run: ./tools/release/build_arbiter_artifacts.sh "${{ steps.meta.outputs.version }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arbiter-release-dist
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Arbiter v${{ steps.meta.outputs.version }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs:
      - build-and-release
    if: (github.event_name != 'workflow_dispatch' || github.event.inputs.update_homebrew == 'true') && secrets.HOMEBREW_TAP_TOKEN != ''
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      SOURCE_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: arbiter-release-dist
          path: dist

      - name: Render Homebrew formula
        run: |
          mkdir -p output
          ./tools/release/render_homebrew_formula.sh \
            "${{ needs.build-and-release.outputs.version }}" \
            "${SOURCE_REPO}" \
            "dist/checksums.txt" \
            "output/arbiter.rb"

      - name: Update tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_REPO}" ]]; then
            HOMEBREW_TAP_REPO="yajasmalhotra/homebrew-tap"
          fi
          tmpdir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "${tmpdir}/tap"
          mkdir -p "${tmpdir}/tap/Formula"
          cp output/arbiter.rb "${tmpdir}/tap/Formula/arbiter.rb"

          cd "${tmpdir}/tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/arbiter.rb; then
            echo "No formula changes detected."
            exit 0
          fi

          git add Formula/arbiter.rb
          git commit -m "arbiter v${{ needs.build-and-release.outputs.version }}"
          git push origin HEAD
