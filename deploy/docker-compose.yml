services:
  arbiter:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ARBITER_ADDR: ":8080"
      ARBITER_OPA_URL: "http://opa:8181"
      ARBITER_REDIS_ADDR: "redis:6379"
      ARBITER_TOKEN_SECRET: "dev-secret-change-me"
      ARBITER_TOKEN_ISSUER: "arbiter"
      ARBITER_DECISION_TIMEOUT: "1500ms"
      ARBITER_GATEWAY_SHARED_KEY: ${ARBITER_GATEWAY_SHARED_KEY:-}
      ARBITER_SERVICE_SHARED_KEY: ${ARBITER_SERVICE_SHARED_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      - opa
      - redis

  opa:
    # Pin below OPA 1.x: v1 requires `if` before rule bodies; policy/ is classic Rego.
    image: openpolicyagent/opa:0.69.0
    # Prefix loads JSON at data.arbiter (see policy/arbiter.json). Loading /policy
    # recursively maps policy/data/config.json to data.data.* and breaks authz.
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "arbiter:/policy/arbiter.json"
      - "/policy/core"
      - "/policy/domain"
    volumes:
      - ../policy:/policy:ro
    ports:
      - "8181:8181"

  redis:
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--appendonly"
      - "no"
    ports:
      - "6379:6379"

  # OpenAI-compatible gateway for client-style tests (examples/litellm-harness without --arbiter-only).
  # Start with: docker compose --profile litellm up -d
  # Set OPENAI_API_KEY in your environment or in a deploy/.env file (see deploy/env.example).
  litellm:
    profiles: ["litellm"]
    image: docker.litellm.ai/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-anything}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
