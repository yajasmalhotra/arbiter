services:
  control-plane:
    build:
      context: ../apps/control-plane
      dockerfile: Dockerfile
    environment:
      ARBITER_DB_URL: "postgres://arbiter:arbiter@postgres:5432/arbiter?sslmode=disable"
      ARBITER_BUNDLE_SERVICE_TOKEN: ${ARBITER_BUNDLE_SERVICE_TOKEN:-dev-bundle-token}
      ARBITER_BUNDLE_SERVICE_TOKEN_SCOPES: ${ARBITER_BUNDLE_SERVICE_TOKEN_SCOPES:-bundle:read}
      CONTROL_PLANE_API_KEY: ${CONTROL_PLANE_API_KEY:-}
      ARBITER_TENANT_ID: ${ARBITER_TENANT_ID:-default}
      ARBITER_ACTOR: ${ARBITER_ACTOR:-control-plane}
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arbiter
      POSTGRES_USER: arbiter
      POSTGRES_PASSWORD: arbiter
    ports:
      - "5432:5432"
    volumes:
      - arbiter-postgres:/var/lib/postgresql/data

  arbiter:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ARBITER_ADDR: ":8080"
      ARBITER_OPA_URL: "http://opa:8181"
      ARBITER_REDIS_ADDR: "redis:6379"
      ARBITER_TOKEN_SECRET: "dev-secret-change-me"
      ARBITER_TOKEN_ISSUER: "arbiter"
      ARBITER_DECISION_TIMEOUT: "1500ms"
      ARBITER_GATEWAY_SHARED_KEY: ${ARBITER_GATEWAY_SHARED_KEY:-}
      ARBITER_SERVICE_SHARED_KEY: ${ARBITER_SERVICE_SHARED_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      - opa
      - redis

  opa:
    # Pin below OPA 1.x: v1 requires `if` before rule bodies; policy/ is classic Rego.
    image: openpolicyagent/opa:0.69.0
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--set=services.control_plane.url=http://control-plane:3000"
      - "--set=services.control_plane.credentials.bearer.token=${ARBITER_BUNDLE_SERVICE_TOKEN:-dev-bundle-token}"
      - "--set=bundles.arbiter.service=control_plane"
      - "--set=bundles.arbiter.resource=/api/bundles/channels/prod/artifact"
      - "--set=bundles.arbiter.polling.min_delay_seconds=5"
      - "--set=bundles.arbiter.polling.max_delay_seconds=20"
    ports:
      - "8181:8181"
    depends_on:
      - control-plane

  redis:
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--appendonly"
      - "no"
    ports:
      - "6379:6379"

  # OpenAI-compatible gateway for client-style tests (examples/litellm-harness without --arbiter-only).
  # Start with: docker compose --profile litellm up -d
  # Set OPENAI_API_KEY in your environment or in a deploy/.env file (see deploy/env.example).
  litellm:
    profiles: ["litellm"]
    image: docker.litellm.ai/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-anything}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]

volumes:
  arbiter-postgres:
